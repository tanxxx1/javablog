<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实验2：经典扫雷游戏 · 在线体验</title>
    <script src="https://cjrtnc.leaningtech.com/3.0/loader.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --border: #334155;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #a78bfa;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 70% 50%, rgba(167,139,250,0.07), transparent 60%);
            pointer-events: none;
        }
        .container {
            position: relative;
            z-index: 1;
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
            overflow: hidden;
            max-width: 620px;
            width: 95%;
        }
        .header {
            padding: 20px 24px 0;
        }
        .header h1 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
        }
        .header .tags {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .header .tag {
            font-size: 0.72rem;
            padding: 2px 10px;
            border-radius: 999px;
            background: rgba(167,139,250,0.1);
            color: var(--accent);
            border: 1px solid rgba(167,139,250,0.2);
        }
        .display-area {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px 16px 20px;
            min-height: 580px;
            background: #0b1120;
        }
        #cheerpj-display {
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 24px rgba(167,139,250,0.06);
        }
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            color: var(--muted);
            font-size: 0.9rem;
            min-height: 520px;
            justify-content: center;
        }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .footer {
            text-align: center;
            padding: 12px;
            font-size: 0.78rem;
            color: var(--muted);
        }
        .footer a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>💣 实验2：经典扫雷游戏</h1>
        <div class="tags">
            <span class="tag">双难度 9×9 / 16×16</span>
            <span class="tag">MouseAdapter 左右键</span>
            <span class="tag">递归级联翻开</span>
            <span class="tag">Serializable 存档</span>
            <span class="tag">Timer 计时</span>
        </div>
    </div>
    <div class="display-area">
        <div class="loading" id="loader">
            <div class="spinner"></div>
            <span>正在加载扫雷游戏…</span>
        </div>
        <div id="cheerpj-display"></div>
    </div>
    <div class="footer">
        <a href="lab4_post.md">← 返回实验报告</a> &nbsp;|&nbsp;
        Powered by <a href="https://leaningtech.com/cheerpj/" target="_blank">CheerpJ 3.0</a>
    </div>
</div>

<script>
(async () => {
    await cheerpjInit({ preloadResources: { '/app/': './' } });
    // 550×610 适配 16×16 困难模式控制面板 + 雷盘
    await cheerpjCreateDisplay(document.getElementById('cheerpj-display'), 550, 610);
    document.getElementById('loader').style.display = 'none';
    document.getElementById('cheerpj-display').style.display = 'block';
    cheerpjRunMain('MineSweeperGame', '/app/minesweeper.jar');
})();
</script>
</body>
</html>
