<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Java 学习笔记</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle Theme">🌞</button>
  <div class="top-bar"></div>
  <header>
    <div class="profile-section">
      <img src="avatar.jpg" alt="谭礼嘉" class="avatar">
      <h1>☕ 谭礼嘉的 Java 学习笔记</h1>
      <p class="subtitle">记录每一行代码的成长</p>
      <a href="mailto:Tan2364130768@mail.com" class="contact-email">📧 Tan2364130768@mail.com</a>
    </div>
  </header>

  <div class="filter-section">
    <input type="text" class="search-box" placeholder="搜索笔记标题...">
    <div class="tag-filters">
      <button class="tag-btn active" data-filter="全部">全部</button>
      <button class="tag-btn" data-filter="Java">Java</button>
      <button class="tag-btn" data-filter="算法">算法</button>
      <button class="tag-btn" data-filter="基础">基础</button>
      <button class="tag-btn" data-filter="进阶">进阶</button>
    </div>
  </div>

  <main>
    <ul class="note-list">
      <li class="stagger-item" data-tags="Java,算法" style="animation-delay: 0.1s;">
        <a href="notes/find-prime.html">
          <span class="note-title">如何快速找出素数</span>
          <div class="note-meta">
            <span class="note-date">2026-05-09</span>
            <span class="note-date" style="margin-left:0">⏳ 阅读 3 分钟</span>
          </div>
        </a>
      </li>
      <li class="stagger-item" data-tags="Java,进阶" style="animation-delay: 0.2s;">
        <a href="notes/java-enum.html">
          <span class="note-title">Java 枚举（Enum）的应用场景</span>
          <div class="note-meta">
            <span class="note-date">2026-05-09</span>
            <span class="note-date" style="margin-left:0">⏳ 阅读 4 分钟</span>
          </div>
        </a>
      </li>
      <li class="stagger-item" data-tags="Java,基础" style="animation-delay: 0.3s;">
        <a href="notes/hello-world.html">
          <span class="note-title">Java 第一课：Hello World</span>
          <div class="note-meta">
            <span class="note-date">2026-05-09</span>
            <span class="note-date" style="margin-left:0">⏳ 阅读 2 分钟</span>
          </div>
        </a>
      </li>
    </ul>

    <div class="empty-state" id="empty-state">
      <span class="icon">🔍</span>
      <p>没有找到相关的笔记哦~</p>
    </div>
  </main>

  <button class="back-to-top" id="back-to-top" aria-label="Back to Top">⬆</button>

  <footer>
    <p>认真敲好每一行代码 ✌️</p>
  </footer>

  <script>
    (function () {
      const searchBox = document.querySelector('.search-box');
      const tagBtns = document.querySelectorAll('.tag-btn');
      const noteItems = document.querySelectorAll('.note-list li');
      const emptyState = document.getElementById('empty-state');
      const themeToggle = document.getElementById('theme-toggle');
      const backToTop = document.getElementById('back-to-top');

      let activeTag = '全部';

      // 1. Theme Toggle
      let isLight = localStorage.getItem('theme') === 'light';
      function updateTheme() {
        if (isLight) {
          document.body.classList.add('light-theme');
          themeToggle.textContent = '🌙';
        } else {
          document.body.classList.remove('light-theme');
          themeToggle.textContent = '🌞';
        }
      }
      updateTheme();
      themeToggle.addEventListener('click', function() {
        isLight = !isLight;
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
        updateTheme();
      });

      // 2. Back to Top
      window.addEventListener('scroll', function() {
        if (window.scrollY > 300) {
          backToTop.classList.add('visible');
        } else {
          backToTop.classList.remove('visible');
        }
      });
      backToTop.addEventListener('click', function() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });

      // 3. Tag Counts update
      function updateTagCounts() {
        tagBtns.forEach(function(btn) {
          const tag = btn.getAttribute('data-filter');
          if (tag === '全部') {
            btn.textContent = '全部 (' + noteItems.length + ')';
            return;
          }
          let count = 0;
          noteItems.forEach(function(li) {
            const tags = li.getAttribute('data-tags') || '';
            const tagsArr = tags.split(',').map(function (t) { return t.trim(); });
            if (tagsArr.indexOf(tag) !== -1) { count++; }
          });
          btn.textContent = tag + ' (' + count + ')';
        });
      }
      updateTagCounts();

      // 4. Filter logic with Empty State
      function filterNotes() {
        const query = searchBox.value.trim().toLowerCase();
        let visibleCount = 0;

        noteItems.forEach(function (li) {
          const title = li.querySelector('.note-title').textContent.toLowerCase();
          const tags = li.getAttribute('data-tags') || '';
          const tagsArr = tags.split(',').map(function (t) { return t.trim(); });

          const matchTag = activeTag === '全部' || tagsArr.indexOf(activeTag) !== -1;
          const matchSearch = query === '' || title.indexOf(query) !== -1;

          if (matchTag && matchSearch) {
            li.style.display = '';
            visibleCount++;
          } else {
            li.style.display = 'none';
          }
        });

        if (visibleCount === 0) {
          emptyState.style.display = 'block';
        } else {
          emptyState.style.display = 'none';
        }
      }

      searchBox.addEventListener('input', filterNotes);

      tagBtns.forEach(function (btn) {
        btn.addEventListener('click', function () {
          tagBtns.forEach(function (b) { b.classList.remove('active'); });
          btn.classList.add('active');
          activeTag = btn.getAttribute('data-filter');
          filterNotes();
        });
      });
    })();
  </script>
</body>
</html>
